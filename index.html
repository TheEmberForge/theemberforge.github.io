<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ED+ Schedule | Mon Emploi du Temps</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ICAL.js pour lire le flux -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .course-now {
            border-left: 4px solid #38bdf8 !important;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
        }

        /* Animation du loader */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(30,41,59,0.5) 25%, rgba(51,65,85,0.5) 50%, rgba(30,41,59,0.5) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
    </style>
</head>
<body class="text-slate-100 selection:bg-sky-500/30">

    <!-- Arrière-plan décoratif -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-sky-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-indigo-500/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
            <div>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
                    ED+ Schedule
                </h1>
                <p class="text-slate-400 text-sm mt-1">Votre emploi du temps en temps réel</p>
            </div>
            
            <div class="flex items-center gap-2 bg-slate-900/50 p-1 rounded-xl border border-white/5 backdrop-blur-md">
                <button onclick="refreshCalendar()" class="p-2 text-slate-500 hover:text-sky-400 transition-colors" id="refresh-btn">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Liste des cours -->
        <main id="schedule-container" class="space-y-4">
            <!-- Les cours seront injectés ici par JS -->
            <div class="space-y-4" id="skeleton-loader">
                <div class="h-24 w-full skeleton rounded-2xl border border-white/5"></div>
                <div class="h-24 w-full skeleton rounded-2xl border border-white/5"></div>
                <div class="h-24 w-full skeleton rounded-2xl border border-white/5"></div>
            </div>
        </main>

        <footer class="mt-12 text-center text-slate-600 text-xs py-6 border-t border-white/5">
            <p>© 2024 Design Inspiré par EcoleDirecte.plus • Version HTML Pur</p>
        </footer>
    </div>

    <script>
        const ICAL_URL = "https://api.ecoledirecte.com/v3/ical/E/13066/636d70335930356c64554e4c64465a6157466772536b566c5547637963455a4e5433703155553977593249.ics";
        const PROXY_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ICAL_URL);

        async function fetchCalendar() {
            const container = document.getElementById('schedule-container');
            const refreshBtn = document.getElementById('refresh-btn');
            
            refreshBtn.classList.add('animate-spin');
            
            try {
                const response = await fetch(PROXY_URL);
                if (!response.ok) throw new Error("Erreur de récupération");
                
                const text = await response.text();
                const jcalData = ICAL.parse(text);
                const comp = new ICAL.Component(jcalData);
                const vevents = comp.getAllSubcomponents('vevent');

                const now = new Date();
                const todayStart = new Date();
                todayStart.setHours(0, 0, 0, 0);

                const events = vevents.map(vevent => {
                    const event = new ICAL.Event(vevent);
                    return {
                        title: event.summary,
                        start: event.startDate.toJSDate(),
                        end: event.endDate.toJSDate(),
                        location: event.location || "Salle non définie"
                    };
                })
                .filter(e => e.end >= todayStart)
                .sort((a, b) => a.start - b.start);

                renderEvents(events);

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="bg-red-500/10 border border-red-500/20 rounded-2xl p-8 text-center">
                        <i data-lucide="alert-circle" class="mx-auto text-red-500 mb-4 w-10 h-10"></i>
                        <h3 class="text-lg font-semibold text-red-200">Erreur de synchronisation</h3>
                        <p class="text-red-400/80 text-sm mt-2">Impossible de charger les cours. Vérifiez votre flux iCal.</p>
                    </div>
                `;
                lucide.createIcons();
            } finally {
                refreshBtn.classList.remove('animate-spin');
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('schedule-container');
            
            if (events.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10">Aucun cours prévu.</p>`;
                return;
            }

            const now = new Date();
            
            container.innerHTML = events.map(event => {
                const isNow = now >= event.start && now <= event.end;
                const startTime = event.start.toLocaleTimeString('fr-FR', { hour: '2d-digit', minute: '2d-digit' });
                const endTime = event.end.toLocaleTimeString('fr-FR', { hour: '2d-digit', minute: '2d-digit' });
                const dateStr = event.start.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

                return `
                    <div class="group relative overflow-hidden transition-all duration-300 hover:translate-y-[-2px] ${isNow ? 'ring-2 ring-sky-500/50 ring-offset-4 ring-offset-[#020617]' : ''}">
                        <div class="glass-card relative rounded-2xl p-5 hover:bg-slate-800/50 transition-colors ${isNow ? 'course-now' : ''}">
                            ${isNow ? `
                                <div class="absolute top-4 right-4 flex items-center gap-1.5">
                                    <span class="relative flex h-2 w-2">
                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-2 w-2 bg-sky-500"></span>
                                    </span>
                                    <span class="text-[10px] font-bold text-sky-400 uppercase tracking-widest">En cours</span>
                                </div>
                            ` : ''}
                            
                            <div class="flex flex-col gap-3">
                                <div class="flex items-center gap-2 text-sky-400/80 text-[11px] font-semibold uppercase tracking-wider">
                                    <i data-lucide="calendar" class="w-3 h-3"></i>
                                    <span>${dateStr}</span>
                                </div>

                                <h3 class="text-lg font-bold text-white group-hover:text-sky-400 transition-colors leading-tight">
                                    ${event.title}
                                </h3>

                                <div class="flex flex-wrap items-center gap-4 mt-1">
                                    <div class="flex items-center gap-1.5 text-slate-400 text-sm">
                                        <i data-lucide="clock" class="w-3.5 h-3.5 text-slate-500"></i>
                                        <span>${startTime} — ${endTime}</span>
                                    </div>
                                    
                                    <div class="flex items-center gap-1.5 px-2.5 py-1 bg-white/5 rounded-full border border-white/5 text-slate-300 text-sm">
                                        <i data-lucide="map-pin" class="w-3.5 h-3.5 text-sky-500"></i>
                                        <span class="font-medium">${event.location}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Initialiser les icônes Lucide pour les nouveaux éléments
            lucide.createIcons();
        }

        function refreshCalendar() {
            fetchCalendar();
        }

        // Lancement initial
        window.onload = () => {
            fetchCalendar();
            lucide.createIcons();
        };
    </script>
</body>
</html>
